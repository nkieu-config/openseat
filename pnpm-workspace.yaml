packages:
  - apps/*
  - packages/*
  - tests/*

overrides:
  ioredis: ^5.11.1
  ws: ^8.21.0

allowBuilds:
  '@apollo/protobufjs': false
  '@prisma/engines': true
  '@scarf/scarf': false
  argon2: true
  msgpackr-extract: true
  prisma: true
  protobufjs: false
  sharp: true
  unrs-resolver: true

onlyBuiltDependencies:
  - '@nestjs/core'
  - '@prisma/client'
  - '@prisma/engines'
  - '@swc/core'
  - '@tailwindcss/oxide'
  - argon2
  - esbuild
  - prisma
  - sharp
  - unrs-resolver

ignoredBuiltDependencies:
  - '@apollo/protobufjs'
  - '@scarf/scarf'
  - protobufjs
