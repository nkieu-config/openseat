envVarGroups:
  - name: paymock-shared
    envVars:
      - key: PAYMOCK_API_KEY
        generateValue: true
      - key: PAYMOCK_WEBHOOK_SECRET
        generateValue: true
  - name: gate-shared
    envVars:
      - key: GATE_ADMISSION_SECRET
        generateValue: true

services:
  - type: web
    name: openseat-api
    runtime: node
    plan: free
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter api db:generate && pnpm --filter api build && pnpm --filter api db:migrate:deploy && node apps/api/dist/seed.js
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: '22.18.0'
      - key: DATABASE_URL
        sync: false
      - key: WEB_ORIGIN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ORIGIN
        sync: false
      - key: APP_VERSION
        value: m11
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: openseat-redis
          property: connectionString
      - key: PAYMOCK_URL
        value: https://openseat-paymock.onrender.com
      - key: API_PUBLIC_URL
        value: https://openseat-api.onrender.com
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false
      - key: OTEL_SERVICE_NAME
        value: openseat-api
      - key: OTEL_RESOURCE_ATTRIBUTES
        value: service.namespace=openseat,deployment.environment=production
      - fromGroup: paymock-shared
      - fromGroup: gate-shared

  - type: web
    name: openseat-paymock
    runtime: go
    plan: free
    rootDir: services/paymock
    buildCommand: go build -o paymock .
    startCommand: ./paymock
    healthCheckPath: /health
    envVars:
      - key: PAYMOCK_PUBLIC_URL
        value: https://openseat-paymock.onrender.com
      - fromGroup: paymock-shared

  - type: web
    name: openseat-gate
    runtime: go
    plan: free
    rootDir: services/gate
    buildCommand: go build -o gate .
    startCommand: ./gate
    healthCheckPath: /health
    envVars:
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: openseat-redis
          property: connectionString
      - key: ADMIT_BATCH
        value: '8'
      - key: ADMIT_INTERVAL_MS
        value: '1000'
      - key: ADMISSION_TTL_SECONDS
        value: '600'
      - key: OTEL_EXPORTER_OTLP_ENDPOINT
        sync: false
      - key: OTEL_EXPORTER_OTLP_HEADERS
        sync: false
      - key: OTEL_SERVICE_NAME
        value: openseat-gate
      - key: OTEL_RESOURCE_ATTRIBUTES
        value: service.namespace=openseat,deployment.environment=production
      - fromGroup: gate-shared

  - type: keyvalue
    name: openseat-redis
    plan: free
    ipAllowList: []
