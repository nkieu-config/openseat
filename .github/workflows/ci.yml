name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo run lint typecheck build test

  paymock:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/paymock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/paymock/go.mod
      - run: go vet ./...
      - run: go test ./...

  gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/gate/go.mod
      - run: go vet ./...
      - run: go test ./...

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openseat
          POSTGRES_PASSWORD: openseat
          POSTGRES_DB: openseat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openseat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://openseat:openseat@localhost:5432/openseat
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api db:generate
      - run: pnpm --filter api db:migrate:deploy
      - run: pnpm --filter api test:e2e
