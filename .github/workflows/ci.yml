name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-
      - run: pnpm turbo run lint typecheck build test --cache-dir=.turbo
      - name: Verify the OpenAPI contract is in sync
        run: pnpm --filter api openapi:dump && git diff --exit-code packages/contracts/openapi.json

  paymock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/paymock
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/paymock/go.mod
      - run: go vet ./...
      - run: go test -race ./...

  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/gate/go.mod
      - run: go vet ./...
      - run: go test -race ./...

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openseat
          POSTGRES_PASSWORD: openseat
          POSTGRES_DB: openseat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openseat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://openseat:openseat@localhost:5432/openseat
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret
      PAYMOCK_WEBHOOK_SECRET: paymock-dev-webhook-secret
      GATE_ADMISSION_SECRET: gate-dev-admission-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api db:generate
      - run: pnpm --filter api db:migrate:deploy
      - run: pnpm --filter api test:e2e
      - name: Verify the GraphQL schema is in sync
        run: git diff --exit-code apps/api/src/schema.gql

  browser:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openseat
          POSTGRES_PASSWORD: openseat
          POSTGRES_DB: openseat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openseat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://openseat:openseat@localhost:5432/openseat
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-jwt-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/gate/go.mod
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter api db:generate
      - run: pnpm --filter api db:migrate:deploy
      - uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm --filter @openseat/e2e exec playwright install --with-deps chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
      - run: pnpm --filter @openseat/e2e exec playwright install-deps chromium
        if: steps.playwright-cache.outputs.cache-hit == 'true'
      - run: pnpm e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: tests/e2e/report
          retention-days: 7

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high

  image:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: openseat
          POSTGRES_PASSWORD: openseat
          POSTGRES_DB: openseat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openseat"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://openseat:openseat@localhost:5432/openseat
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f apps/api/Dockerfile --target migrate -t openseat-migrate:ci .
      - run: docker build -f apps/api/Dockerfile -t openseat-api:ci .
      - name: Apply migrations and seed the demo data
        run: docker run --rm --network host -e DATABASE_URL="$DATABASE_URL" openseat-migrate:ci
      - name: Start the API image
        run: |
          docker run -d --name api --network host \
            -e DATABASE_URL="$DATABASE_URL" \
            -e REDIS_URL=redis://localhost:6379 \
            -e JWT_SECRET=ci-image-smoke \
            -e PAYMOCK_API_KEY=ci -e PAYMOCK_WEBHOOK_SECRET=ci \
            -e GATE_ADMISSION_SECRET=ci \
            -e WEB_ORIGIN=http://localhost:3000 \
            -e PAYMOCK_URL=http://localhost:4100 \
            -e API_PUBLIC_URL=http://localhost:4000 \
            openseat-api:ci
      - name: Probe every surface the runtime prune could break
        run: bash scripts/smoke-api-image.sh
      - name: Show container logs on failure
        if: failure()
        run: docker logs api
