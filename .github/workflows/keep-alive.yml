name: Keep-alive ping

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping API health endpoint
        env:
          API_HEALTH_URL: ${{ vars.API_HEALTH_URL }}
        run: |
          if [ -z "$API_HEALTH_URL" ]; then
            echo "API_HEALTH_URL repository variable not set; skipping ping"
            exit 0
          fi
          curl -fsS --max-time 30 --retry 5 --retry-delay 15 --retry-all-errors "$API_HEALTH_URL"
